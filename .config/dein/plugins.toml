hook_add = """
  let g:coc_global_extensions = [
  \ 'coc-toml',
  \ 'coc-css',
  \ 'coc-git',
  \ 'coc-go',
  \ 'coc-html',
  \ 'coc-json',
  \ 'coc-python',
  \ 'coc-rust-analyzer',
  \ 'coc-sh',
  \ 'coc-tsserver',
  \ 'coc-explorer'
  \ ]
"""
